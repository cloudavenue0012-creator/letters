<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>To. 김은웅 실장님</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700;800&family=Gaegu:wght@400;700&family=Gowun+Batang:wght@400;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    width: 100%;
    overflow-x: hidden;
  }

  body {
    background: linear-gradient(180deg, #e8dfd0 0%, #d9cdb8 100%);
    min-height: 100vh;
    font-family: 'Nanum Myeongjo', serif;
    color: #3a2f24;
    padding: 32px 16px 64px;
    position: relative;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3' /%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.25'/%3E%3C/svg%3E");
    pointer-events: none;
    opacity: 0.4;
    z-index: 0;
  }

  .envelope-stage {
    position: relative;
    z-index: 1;
    max-width: 480px;
    margin: 0 auto;
  }

  .letter {
    background: #faf6ec;
    background-image:
      linear-gradient(180deg, rgba(255,253,247,0.6) 0%, rgba(245,238,222,0.4) 100%);
    padding: 56px 32px 48px;
    border-radius: 2px;
    box-shadow:
      0 1px 2px rgba(58, 47, 36, 0.08),
      0 8px 24px rgba(58, 47, 36, 0.12),
      0 24px 60px rgba(58, 47, 36, 0.15);
    position: relative;
    overflow: hidden;
  }

  .letter::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='p'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.7' numOctaves='2' /%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23p)' opacity='0.08'/%3E%3C/svg%3E");
    pointer-events: none;
    mix-blend-mode: multiply;
  }

  .ornament {
    text-align: center;
    margin-bottom: 36px;
    opacity: 0;
    animation: fadeIn 1.2s ease-out 0.3s forwards;
  }

  .ornament svg {
    width: 32px;
    height: 32px;
    opacity: 0.55;
  }

  .ornament-line {
    display: inline-block;
    width: 40px;
    height: 1px;
    background: #8b7355;
    vertical-align: middle;
    margin: 0 12px;
    opacity: 0.4;
  }

  .salutation {
    font-size: 17px;
    font-weight: 700;
    margin-bottom: 36px;
    letter-spacing: 0.02em;
    opacity: 0;
    animation: fadeUp 1s ease-out 0.6s forwards;
  }

  .paragraph {
    font-size: 16px;
    line-height: 1.85;
    margin-bottom: 28px;
    opacity: 0;
    animation: fadeUp 1s ease-out forwards;
    word-break: keep-all;
    letter-spacing: 0.01em;
  }

  .paragraph:last-of-type {
    margin-bottom: 0;
  }

  .paragraph:nth-of-type(1) { animation-delay: 0.9s; }
  .paragraph:nth-of-type(2) { animation-delay: 1.4s; }
  .paragraph:nth-of-type(3) { animation-delay: 1.9s; }
  .paragraph:nth-of-type(4) { animation-delay: 2.4s; }

  .closing {
    margin-top: 40px;
    text-align: right;
    opacity: 0;
    animation: fadeUp 1s ease-out 2.9s forwards;
  }

  .signature {
    font-family: 'Gaegu', cursive;
    font-size: 26px;
    color: #4a3826;
    font-weight: 700;
    line-height: 1.4;
    transform: rotate(-2deg);
    display: inline-block;
    margin-top: 8px;
  }

  .date {
    font-family: 'Gowun Batang', serif;
    font-size: 12px;
    color: #8b7355;
    margin-top: 24px;
    letter-spacing: 0.15em;
    text-align: right;
    opacity: 0;
    animation: fadeIn 1.2s ease-out 3.3s forwards;
  }

  .footer-ornament {
    text-align: center;
    margin-top: 36px;
    opacity: 0;
    animation: fadeIn 1.2s ease-out 3.5s forwards;
  }

  .footer-ornament svg {
    width: 24px;
    height: 24px;
    opacity: 0.4;
  }

  @keyframes fadeIn {
    to { opacity: 1; }
  }

  @keyframes fadeUp {
    from {
      opacity: 0;
      transform: translateY(8px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  .cover {
    position: fixed;
    inset: 0;
    background: linear-gradient(135deg, #c9b896 0%, #a89678 100%);
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    transition: opacity 1.2s ease, transform 1.2s ease;
    cursor: pointer;
  }

  .cover.hidden {
    opacity: 0;
    transform: translateY(-100%);
    pointer-events: none;
  }

  .cover-inner {
    text-align: center;
    color: #faf6ec;
    padding: 24px;
  }

  .cover-to {
    font-family: 'Nanum Myeongjo', serif;
    font-size: 14px;
    letter-spacing: 0.3em;
    opacity: 0.7;
    margin-bottom: 12px;
  }

  .cover-name {
    font-family: 'Nanum Myeongjo', serif;
    font-size: 28px;
    font-weight: 700;
    margin-bottom: 48px;
    letter-spacing: 0.05em;
  }

  .cover-seal {
    width: 80px;
    height: 80px;
    border: 1.5px solid rgba(250, 246, 236, 0.6);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 36px;
    font-family: 'Nanum Myeongjo', serif;
    font-size: 11px;
    letter-spacing: 0.2em;
    animation: gentle-pulse 2.5s ease-in-out infinite;
  }

  @keyframes gentle-pulse {
    0%, 100% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.05); opacity: 0.85; }
  }

  .cover-hint {
    font-size: 12px;
    opacity: 0.55;
    letter-spacing: 0.15em;
  }

  @media (max-width: 360px) {
    body { padding: 24px 12px 48px; }
    .letter { padding: 44px 24px 40px; }
    .paragraph { font-size: 15px; }
  }
</style>
</head>
<body>

  <div class="cover" id="cover">
    <div class="cover-inner">
      <div class="cover-to">TO.</div>
      <div class="cover-name">김은웅 실장님</div>
      <div class="cover-seal">FROM<br>윤태원</div>
      <div class="cover-hint">화면을 터치해주세요</div>
    </div>
  </div>

  <div class="envelope-stage">
    <article class="letter">

      <div class="ornament">
        <span class="ornament-line"></span>
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 2C12 2 14 6 14 9C14 11 13 12 12 12C11 12 10 11 10 9C10 6 12 2 12 2Z" fill="#8b7355"/>
          <path d="M2 12C2 12 6 10 9 10C11 10 12 11 12 12C12 13 11 14 9 14C6 14 2 12 2 12Z" fill="#8b7355"/>
          <path d="M22 12C22 12 18 10 15 10C13 10 12 11 12 12C12 13 13 14 15 14C18 14 22 12 22 12Z" fill="#8b7355"/>
          <path d="M12 22C12 22 14 18 14 15C14 13 13 12 12 12C11 12 10 13 10 15C10 18 12 22 12 22Z" fill="#8b7355"/>
          <circle cx="12" cy="12" r="1.5" fill="#6b4423"/>
        </svg>
        <span class="ornament-line"></span>
      </div>

      <div class="salutation">실장님께,</div>

      <p class="paragraph">
        힘든 시기에 함께 한 분이 실장님이었다는 게 다행이었습니다.
      </p>

      <p class="paragraph">
        제가 부족한 부분, 팀원들이 부족한 부분을 모두 소리 없이 채워주셨습니다.
        그게 얼마나 무거운 일인지 알고 있기에 존경하는 마음이 큽니다.
      </p>

      <p class="paragraph">
        떠나시게 되는 것이 확정됐을 때 표현을 많이 못 했습니다. 이제서야 이 편지로 전합니다.
        가시게 돼서 무척 아쉽고, 보여주신 모습 많이 적용해 나가겠습니다.
      </p>

      <p class="paragraph">
        안녕히 가십시오. 계속 연락 드리겠습니다.
      </p>

      <div class="closing">
        <div class="signature">— 윤태원 드림</div>
      </div>

      <div class="date">2026 . 05 . 28</div>

      <div class="footer-ornament">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="12" cy="12" r="2" fill="#8b7355"/>
          <circle cx="4" cy="12" r="1" fill="#8b7355"/>
          <circle cx="20" cy="12" r="1" fill="#8b7355"/>
        </svg>
      </div>

    </article>
  </div>

  <script>
    const cover = document.getElementById('cover');
    cover.addEventListener('click', () => {
      cover.classList.add('hidden');
    });
  </script>

</body>
</html>
